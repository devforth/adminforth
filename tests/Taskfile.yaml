version: '3'
tasks:
  start_app:
    desc: "Start the application server for testing"
    cmds:
      - "cd application && pnpm migrate:local && pnpm install && pnpm start"
  
  cleanup:
    cmds:
      - rm -f application/.db.sqlite


  run_tests:
    desc: "Run unit tests"
    cmds:
      - "cd jest_tests && pnpm install && pnpm test"